services:
  db:
    image: postgres:16-alpine
    container_name: application-pal-db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-application_pal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: application-pal-backend
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:3000"
    command: sh -c "npm install && npm run dev --workspace backend"
    volumes:
      - .:/app
      - backend_node_modules:/app/backend/node_modules
      - root_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: application-pal-frontend
    working_dir: /app
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev --workspace frontend -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
      - root_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  root_node_modules:
  backend_node_modules:
  frontend_node_modules:
