services:
  db:
    image: postgres:16-alpine
    container_name: application-pal-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - listen_addresses=*
    ports:
      - "15436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  backend:
    image: application-pal-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: application-pal-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}
    ports:
      - "8071:${PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "backend/scripts/docker-healthcheck.mjs"]
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 40s

  frontend:
    image: application-pal-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: application-pal-frontend
    environment:
      BACKEND_PORT: ${PORT:-3000}
    restart: unless-stopped
    ports:
      - "8070:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
