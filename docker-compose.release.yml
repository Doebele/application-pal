# Application Pal — Release Compose (pre-built images from GitHub Container Registry)
# Usage: docker compose -f docker-compose.release.yml up -d
#
# First-time setup:
#   1. cp .env.example .env && edit .env (change POSTGRES_PASSWORD + optionally JWT_SECRET)
#   2. docker compose -f docker-compose.release.yml up -d
#   3. Open http://localhost:8070 → create your account

services:
  db:
    image: postgres:16-alpine
    container_name: application-pal-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  backend:
    image: ghcr.io/clausmedvesek/application-pal-backend:latest
    container_name: application-pal-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-3000}
      APP_URL: ${APP_URL:-http://localhost:8070}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_FRONTEND_URL: ${GOOGLE_FRONTEND_URL:-}
      GOOGLE_SCOPES: ${GOOGLE_SCOPES:-}
    ports:
      - "8071:${PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 40s

  frontend:
    image: ghcr.io/clausmedvesek/application-pal-frontend:latest
    container_name: application-pal-frontend
    restart: unless-stopped
    environment:
      BACKEND_PORT: ${PORT:-3000}
    ports:
      - "8070:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
