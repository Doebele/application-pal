# Docker Compose: Postgres nur intern exponiert; Host-Zugriff erfolgt nicht aus dem Compose-File.
# Entspricht dem Standard-Pattern des offiziellen Postgres-Images (SCRAM fuer TCP vom Bridge-Netz).

local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
host    all             all             all                     scram-sha-256
